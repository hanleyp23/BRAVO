<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Rush Full Game</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light">

    <main class="container py-5">

        <div class="text-center mb-4">
            <h1 class="display-4 fw-bold">Color Rush</h1>
            <p class="lead">Tap the word that matches the color before time runs out.</p>
            <h4 id="playerGreeting"></h4>
        </div>

        <div class="row justify-content-center">

            <div class="col-md-8 col-lg-6">

                <div class="card shadow-lg border-0 text-center p-4">

                    <div class="d-flex justify-content-between mb-3">
                        <span class="badge bg-primary fs-6">
                            <i class="bi bi-star-fill"></i> <span id="scoreText">Score: 0</span>
                        </span>

                        <span class="badge bg-warning text-dark fs-6">
                            <i class="bi bi-lightning-fill"></i> <span id="streakText">Streak: 0</span>
                        </span>

                        <span class="badge bg-danger fs-6">
                            <i class="bi bi-clock-fill"></i> <span id="timerText">Time: 30</span>
                        </span>
                    </div>

                    <div class="progress mb-4">
                        <div id="timerBar" class="progress-bar bg-danger" style="width:100%;"></div>
                    </div>

                    <h2 id="targetColor" class="fw-bold mb-3"></h2>

                    <p id="instructionText" class="text-muted">
                        Choose the word that belongs to this color.
                    </p>

                    <div id="wordButtons" class="row g-3 mt-3"></div>

                    <p id="message" class="fw-bold fs-4 mt-4"></p>

                    <div id="gameOverArea" style="display:none;">
                        <h2 class="text-danger fw-bold">Game Over</h2>
                        <p id="finalScore" class="fs-5"></p>
                        <p id="highScoreText" class="fs-5"></p>
                    </div>

                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button id="restartBtn" class="btn btn-success">
                            <i class="bi bi-arrow-clockwise"></i> Restart
                        </button>

                        <a href="concept.html" class="btn btn-outline-secondary">
                            Concept Game
                        </a>

                        <a href="index.html" class="btn btn-outline-dark">
                            Home
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>

</body>
</html>

<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <main class="container text-center mt-5">

        <h1 class="mb-3">Color Rush Concept</h1>

        <p class="lead">
            Tap the word that matches the color shown.
        </p>

        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">

            <h3 id="playerGreeting" class="mb-3"></h3>

            <h2 id="targetColor" class="mb-4"></h2>

            <div id="wordButtons" class="d-grid gap-2"></div>

            <h4 id="scoreText" class="mt-4">Score: 0</h4>

            <p id="message" class="fw-bold mt-3"></p>

            <button id="restartBtn" class="btn btn-secondary mt-3">
                Restart
            </button>

        </div>

        <div class="mt-4">
            <a href="index.html" class="btn btn-outline-dark">Back to Login</a>
            <a href="fullgame.html" class="btn btn-primary">Full Game</a>
        </div>

    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>

</body>
</html>

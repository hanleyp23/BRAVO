<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4 text-center" style="max-width: 450px; width: 100%;">

            <h1 class="mb-3">Color Rush</h1>

            <p id="introText" class="mb-4">Enter your name to begin!</p>

            <label id="nameLabel" for="playerName" class="form-label">Player Name</label>

            <input
                type="text"
                id="playerName"
                class="form-control mb-3"
                placeholder="Enter your name">

            <button id="loginBtn" class="btn btn-danger mb-3">
                Start Game
            </button>

            <div id="gameSelection" style="display: none;">

                <h4 class="mb-3">Choose a Game Mode</h4>

                <a href="concept.html" class="btn btn-info w-100 mb-2">
                    Concept Game
                </a>

                <a href="full.html" class="btn btn-info w-100">
                    Full Game
                </a>

            </div>

        </div>

    </main>

    <script>
        document.getElementById("loginBtn").addEventListener("click", function () {
            let name = document.getElementById("playerName").value.trim();

            if (name === "") {
                name = "Guest";
            }

            localStorage.setItem("playerName", name);

            document.getElementById("loginBtn").style.display = "none";
            document.getElementById("playerName").style.display = "none";
            document.getElementById("nameLabel").style.display = "none";
            document.getElementById("introText").style.display = "none";

            document.getElementById("gameSelection").style.display = "block";
        });
    </script>

</body>
</html>

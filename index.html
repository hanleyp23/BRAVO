<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Rush</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <main class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card p-4 shadow text-center" style="width:400px;">

            <h1>Color Rush</h1>

            <p id="introText">Enter your name to begin.</p>

            <input
                type="text"
                id="playerName"
                class="form-control mb-3"
                placeholder="Enter your name">

            <button
                id="startBtn"
                class="btn btn-danger mb-3">
                Start Game
            </button>

            <div id="gameChoice" style="display:none;">

                <h4>Choose a Game Mode</h4>

                <a href="pages/concept.html">

                <a href="pages/full.html">

            </div>

        </div>

    </main>

    <script>
        document.getElementById("startBtn").onclick = function () {

            let name = document.getElementById("playerName").value.trim();

            if (name === "") {
                name = "Guest";
            }

            localStorage.setItem("playerName", name);

            document.getElementById("playerName").style.display = "none";
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("introText").style.display = "none";
            document.getElementById("gameChoice").style.display = "block";

        };
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Rush</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <main class="container text-center mt-5">

        <div class="card p-4 shadow mx-auto" style="width:400px;">

            <h1><i class="bi bi-palette-fill"></i> Color Rush</h1>

            <p>Enter your name to begin.</p>

            <input
                type="text"
                id="playerName"
                class="form-control mb-3"
                placeholder="Enter your name">

            <button
                id="startBtn"
                class="btn btn-danger mb-3">
                Start Game
            </button>

            <div id="gameChoice" style="display:none;">

                <h4>Select a Game</h4>

                <a href="pages/concept.html" class="btn btn-info w-100 mb-2">
                    Concept Game
                </a>

                <a href="pages/full.html" class="btn btn-info w-100">
                    Full Game
                </a>

            </div>

        </div>

    </main>

    <script>

        document.getElementById("startBtn").onclick = function () {

            let name = document.getElementById("playerName").value.trim();

            if (name == "") {
                name = "Guest";
            }

            localStorage.setItem("playerName", name);

            document.getElementById("playerName").style.display = "none";
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("gameChoice").style.display = "block";

        };

    </script>

</body>
</html>

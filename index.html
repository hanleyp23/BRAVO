<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <main class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4 text-center" style="max-width: 450px; width:100%;">

            <h1 class="mb-3">Color Rush</h1>

            <p class="mb-4">
                Enter your name to begin!
            </p>

            <label for="playerName" class="form-label">
                Player Name
            </label>

            <input
                type="text"
                id="playerName"
                class="form-control mb-3"
                placeholder="Enter your name">

           <button
                id="loginBtn"
                class="btn btn-danger mb-3">
                Start Game
            </button>

            <div id="gameSelection" style="display:none;">

                <h4 class="mb-3">
                    Choose a Game Mode
                </h4>

                <a href="concept.html" class="btn btn-info w-100 mb-2">
                    Concept Game
                </a>

                <a href="full.html" class="btn btn-info w-100">
                    Full Game
                </a>

                
            </div>

        </div>

    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $("#loginBtn").click(function () {

            let name = $("#playerName").val().trim();

            if (name === "") {
                name = "Guest";
            }

            localStorage.setItem("playerName", name);

            $("#loginBtn").hide();
            $("#playerName").hide();
            $("label").hide();

            $("#gameSelection").fadeIn();
        });
    </script>

</body>
</html>
